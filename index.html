<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kriptos Hoje</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* URL direta da imagem para garantir a renderização como plano de fundo */
            background-image: url('https://i.ibb.co/zhZLcTc5/image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #121212; /* Fallback caso falte conexão */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px 10px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gold-title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffe066 0%, #f5af19 50%, #e65c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.9);
            letter-spacing: 1px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            width: 100%;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .screen.active {
            display: block;
        }

        /* TELA 1: COTAÇÕES */
        .crypto-card {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        .crypto-info h2 {
            font-size: 1.2rem;
            color: #ddd;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .crypto-info p {
            font-size: 1.6rem;
            font-weight: bold;
            color: #00ff66; /* Verde para destacar o valor frente ao fundo */
            margin-top: 5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 450px;
            margin-top: 15px;
        }

        /* TECLAS 3D & BOTÕES GERAIS */
        .btn-3d {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: linear-gradient(180deg, #444444 0%, #222222 100%);
            border: none;
            border-radius: 6px;
            box-shadow: 0 5px 0 #111111, 0 8px 10px rgba(0,0,0,0.7);
            transition: all 0.05s ease;
            text-align: center;
            outline: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
        }

        .btn-3d:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #111111, 0 3px 5px rgba(0,0,0,0.7);
        }

        .btn-calc { 
            background: linear-gradient(180deg, #0077ee 0%, #0044aa 100%); 
            box-shadow: 0 5px 0 #002266, 0 8px 10px rgba(0,0,0,0.7); 
        }
        .btn-calc:active { box-shadow: 0 0px 0 #002266, 0 3px 5px rgba(0,0,0,0.7); }

        .btn-exit { 
            background: linear-gradient(180deg, #ee3333 0%, #aa1111 100%); 
            box-shadow: 0 5px 0 #550000, 0 8px 10px rgba(0,0,0,0.7); 
        }
        .btn-exit:active { box-shadow: 0 0px 0 #550000, 0 3px 5px rgba(0,0,0,0.7); }

        /* TELA 2: CALCULADORA */
        .calc-container {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.95), 0 10px 25px rgba(0,0,0,0.7);
        }

        .calc-display {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 15px;
            text-align: right;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.9);
        }

        #calc-operation {
            font-size: 0.9rem;
            color: #aaa;
            min-height: 1.2rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #calc-result {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff66;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.5);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .calc-grid .btn-3d {
            padding: 12px 5px;
            font-size: 1.1rem;
            background: linear-gradient(180deg, #484848 0%, #2b2b2b 100%);
            box-shadow: 0 4px 0 #151515, 0 6px 8px rgba(0,0,0,0.6);
        }

        .calc-grid .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #151515, 0 2px 4px rgba(0,0,0,0.6);
        }

        .calc-grid .btn-op { 
            background: linear-gradient(180deg, #ff6a00 0%, #b34a00 100%); 
            box-shadow: 0 4px 0 #662a00, 0 6px 8px rgba(0,0,0,0.6); 
        }
        .calc-grid .btn-op:active { box-shadow: 0 0px 0 #662a00; }

        .calc-grid .btn-sci { 
            background: linear-gradient(180deg, #5c697d 0%, #3b4452 100%); 
            box-shadow: 0 4px 0 #212730, 0 6px 8px rgba(0,0,0,0.6); 
            font-size: 0.9rem; 
        }
        .calc-grid .btn-sci:active { box-shadow: 0 0px 0 #212730; }

        .calc-grid .btn-eq { 
            background: linear-gradient(180deg, #00b359 0%, #007339 100%); 
            box-shadow: 0 4px 0 #004020, 0 6px 8px rgba(0,0,0,0.6); 
        }
        .calc-grid .btn-eq:active { box-shadow: 0 0px 0 #004020; }

        .btn-return {
            margin-bottom: 15px;
            background: linear-gradient(180deg, #555555 0%, #333333 100%);
            box-shadow: 0 4px 0 #1a1a1a, 0 6px 8px rgba(0,0,0,0.6);
            padding: 12px;
            width: 100%;
        }
        .btn-return:active { box-shadow: 0 0px 0 #1a1a1a; }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            color: #ddd;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="gold-title">Kriptos hoje</h1>
    </header>

    <main>
        <!-- TELA 1: COTAÇÕES -->
        <section id="screen-quotes" class="screen active">
            <div class="crypto-card">
                <div class="crypto-info">
                    <h2>Bitcoin (BTC)</h2>
                    <p id="btc-price">Carregando...</p>
                </div>
            </div>
            <div class="crypto-card">
                <div class="crypto-info">
                    <h2>Ethereum (ETH)</h2>
                    <p id="eth-price">Carregando...</p>
                </div>
            </div>
            <div class="crypto-card">
                <div class="crypto-info">
                    <h2>Dólar Comercial (USD)</h2>
                    <p id="usd-price">Carregando...</p>
                </div>
            </div>

            <div class="nav-buttons">
                <button class="btn-3d btn-calc" onclick="playAudio(); switchScreen('screen-calc')">Calculadora</button>
                <button class="btn-3d btn-exit" onclick="playAudio(); exitApp()">Sair</button>
            </div>
        </section>

        <!-- TELA 2: CALCULADORA -->
        <section id="screen-calc" class="screen">
            <button class="btn-3d btn-return" onclick="playAudio(); switchScreen('screen-quotes')">← Voltar para Cotações</button>
            
            <div class="calc-container">
                <div class="calc-display">
                    <div id="calc-operation"></div>
                    <div id="calc-result">0</div>
                </div>
                
                <div class="calc-grid">
                    <!-- Linha 1: Memória e Limpeza -->
                    <button class="btn-3d btn-sci" onclick="pressKey('MC')">MC</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('MR')">MR</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('M+')">M+</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('M-')">M-</button>
                    <button class="btn-3d btn-exit" onclick="pressKey('C')">C</button>

                    <!-- Linha 2: Funções Científicas Básicas -->
                    <button class="btn-3d btn-sci" onclick="pressKey('sin')">sin</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('cos')">cos</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('tan')">tan</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('sqrt')">√</button>
                    <button class="btn-3d btn-op" onclick="pressKey('/')">÷</button>

                    <!-- Linha 3: Números e Operações -->
                    <button class="btn-3d" onclick="pressKey('7')">7</button>
                    <button class="btn-3d" onclick="pressKey('8')">8</button>
                    <button class="btn-3d" onclick="pressKey('9')">9</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('pow')">xʸ</button>
                    <button class="btn-3d btn-op" onclick="pressKey('*')">×</button>

                    <!-- Linha 4: Números e Operações -->
                    <button class="btn-3d" onclick="pressKey('4')">4</button>
                    <button class="btn-3d" onclick="pressKey('5')">5</button>
                    <button class="btn-3d" onclick="pressKey('6')">6</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('log')">log</button>
                    <button class="btn-3d btn-op" onclick="pressKey('-')">-</button>

                    <!-- Linha 5: Números, Porcentagem e Soma -->
                    <button class="btn-3d" onclick="pressKey('1')">1</button>
                    <button class="btn-3d" onclick="pressKey('2')">2</button>
                    <button class="btn-3d" onclick="pressKey('3')">3</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('%')">%</button>
                    <button class="btn-3d btn-op" onclick="pressKey('+')">+</button>

                    <!-- Linha 6: Zero, Ponto e Igual -->
                    <button class="btn-3d" style="grid-column: span 2;" onclick="pressKey('0')">0</button>
                    <button class="btn-3d" onclick="pressKey('.')">,</button>
                    <button class="btn-3d btn-sci" onclick="pressKey('pi')">π</button>
                    <button class="btn-3d btn-eq" onclick="pressKey('=')">=</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        write by Helenio
    </footer>

    <script>
        // --- SISTEMA DE ÁUDIO SINTETIZADO (Web Audio API) ---
        let audioCtx = null;
        function playAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.05);
            } catch (e) {
                console.log("Áudio indisponível.");
            }
        }

        // --- NAVEGAÇÃO ---
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function exitApp() {
            if (confirm("Deseja fechar o aplicativo?")) {
                window.close();
                window.location.href = "about:blank";
            }
        }

        // --- BUSCA DE COTAÇÕES ---
        async function fetchQuotes() {
            try {
                const response = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL,BTC-BRL,ETH-BRL');
                if (!response.ok) throw new Error('Erro de conexão');
                const data = await response.json();

                formatAndDisplay('usd-price', data.USDBRL.bid, true);
                formatAndDisplay('btc-price', data.BTCBRL.bid, true);
                formatAndDisplay('eth-price', data.ETHBRL.bid, true);
            } catch (error) {
                console.error("Erro nas cotações:", error);
                document.getElementById('usd-price').innerText = "Erro";
                document.getElementById('btc-price').innerText = "Erro";
                document.getElementById('eth-price').innerText = "Erro";
            }
        }

        function formatAndDisplay(elementId, value, isCurrency) {
            const num = parseFloat(value);
            if (isNaN(num)) return;
            
            if (isCurrency) {
                document.getElementById(elementId).innerText = num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            } else {
                document.getElementById(elementId).innerText = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
        }

        fetchQuotes();
        setInterval(fetchQuotes, 30000);

        // --- LÓGICA DA CALCULADORA ---
        let currentInput = '0';
        let previousInput = '';
        let operation = null;
        let memory = 0;
        let resetDisplay = false;

        const displayResult = document.getElementById('calc-result');
        const displayOperation = document.getElementById('calc-operation');

        function updateDisplay() {
            displayResult.innerText = currentInput.replace('.', ',');
            if (operation && previousInput) {
                displayOperation.innerText = `${previousInput.replace('.', ',')} ${operation} ${resetDisplay ? '' : currentInput.replace('.', ',')}`;
            } else {
                displayOperation.innerText = '';
            }
        }

        function pressKey(key) {
            playAudio();
            
            if (!isNaN(key) || key === '.') {
                if (currentInput === '0' && key !== '.') {
                    currentInput = key;
                } else if (resetDisplay) {
                    currentInput = key;
                    resetDisplay = false;
                } else {
                    if (key === '.' && currentInput.includes('.')) return;
                    currentInput += key;
                }
            } 
            else if (key === 'C') {
                currentInput = '0';
                previousInput = '';
                operation = null;
                resetDisplay = false;
            }
            else if (key === 'pi') {
                currentInput = Math.PI.toString();
                resetDisplay = true;
            }
            else if (key.startsWith('M') || key.includes('+') && key.length > 1 || key.includes('-') && key.length > 1) {
                handleMemory(key);
                return;
            }
            else if (key === '%') {
                handlePercentage();
            }
            else if (['sin', 'cos', 'tan', 'sqrt', 'log'].includes(key)) {
                handleScientific(key);
            }
            else if (['+', '-', '*', '/', 'pow'].includes(key)) {
                if (operation && !resetDisplay) {
                    calculate();
                }
                previousInput = currentInput;
                operation = key === 'pow' ? '^' : key;
                resetDisplay = true;
            }
            else if (key === '=') {
                if (operation) {
                    calculate();
                    operation = null;
                    resetDisplay = true;
                }
            }
            
            updateDisplay();
        }

        function handleScientific(func) {
            let val = parseFloat(currentInput);
            switch(func) {
                case 'sin': val = Math.sin(val * Math.PI / 180); break;
                case 'cos': val = Math.cos(val * Math.PI / 180); break;
                case 'tan': val = Math.tan(val * Math.PI / 180); break;
                case 'sqrt': val = val >= 0 ? Math.sqrt(val) : NaN; break;
                case 'log': val = val > 0 ? Math.log10(val) : NaN; break;
            }
            currentInput = isNaN(val) ? 'Erro' : parseFloat(val.toFixed(8)).toString();
            resetDisplay = true;
        }

        function handlePercentage() {
            let current = parseFloat(currentInput);
            if (operation === '+' || operation === '-') {
                let prev = parseFloat(previousInput);
                currentInput = (prev * (current / 100)).toString();
            } else {
                currentInput = (current / 100).toString();
            }
        }

        function handleMemory(op) {
            let val = parseFloat(currentInput);
            switch(op) {
                case 'MC': memory = 0; break;
                case 'MR': currentInput = memory.toString(); resetDisplay = true; break;
                case 'M+': memory += isNaN(val) ? 0 : val; resetDisplay = true; break;
                case 'M-': memory -= isNaN(val) ? 0 : val; resetDisplay = true; break;
            }
            updateDisplay();
        }

        function calculate() {
            let prev = parseFloat(previousInput);
            let current = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(current)) return;

            let res = 0;
            switch(operation) {
                case '+': res = prev + current; break;
                case '-': res = prev - current; break;
                case '*': res = prev * current; break;
                case '/': res = current !== 0 ? prev / current : 'Erro'; break;
                case '^': res = Math.pow(prev, current); break;
            }
            
            currentInput = typeof res === 'number' ? parseFloat(res.toFixed(8)).toString() : res;
            previousInput = '';
        }
    </script>
</body>
</html>
